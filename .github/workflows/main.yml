name: MK Clipping Agent
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clipping-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
        run: python src/main.py
      - name: Commit
        run: |
          git config user.name "MK Clipping Agent"
          git config user.email "agent@mk.com"
          git add data/ output/ docs/
          git diff --staged --quiet || git commit -m "update"
          git push

