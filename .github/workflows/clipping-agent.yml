name: MK Clipping Agent

on:
  schedule:
    # Täglich um 07:00 Uhr CET (= 06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manuell auslösbar über GitHub UI

jobs:
  clipping-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Clipping Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Commit results
        run: |
          git config user.name "MK Clipping Agent"
          git config user.email "clipping-agent@te-communications.com"
          git add data/clippings.json output/
          git diff --staged --quiet || git commit -m "🔍 Clipping update $(date +%Y-%m-%d)"
          git push
