name: Test Run

on:
  push:
    branches: [main]
    paths: ['trigger.txt']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run Clipping Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py
      - name: Commit results
        run: |
          git config user.name "MK Clipping Agent"
          git config user.email "clipping-agent@te-communications.com"
          git add data/clippings.json output/
          git diff --staged --quiet || git commit -m "🔍 Clipping update $(date +%Y-%m-%d)"
          git push
